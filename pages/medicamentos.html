  <style>
/* Mover todo a la izquierda */
main, section {
  max-width: none;      /* quita el límite de ancho */
  margin: 0;            /* elimina el centrado automático */
}

/* Lista de medicamentos (cards) alineadas a la izquierda */
#listaMedicamentos {
  justify-content: start; /* pega las cards al borde izquierdo */
}
</style>

<!DOCTYPE html>
<html lang="es">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

</head>

<!-- MEDICAMENTOS -->
<section>

  <button id="btnNuevoMedicamento" class="btn-nuevo-medicamento">
    + Nuevo Medicamento
  </button>

  <!-- FORMULARIO ALTA -->
  <form id="formMedicamento" class="form-card_med hidden">
    <input type="hidden" name="id">

    <!-- Tipo -->
    <div>
      <label for="tipoMedicamento">Tipo de medicamento</label>
      <select name="tipo_medicamento_id" id="tipoMedicamento" required>
        <option value="">Seleccione tipo</option>
      </select>
    </div>

    <!-- DATOS -->
    <div id="datosMedicamento" class="hidden grid-medicamento">

      <div>
        <label>Fecha de carga</label>
        <input type="date" name="fecha_carga" required>
      </div>

      <div>
        <label>Fecha de autorización</label>
        <input type="date" name="fecha_autorizacion" required>
      </div>

      <div id="campoLatas" class="hidden">
        <label>Latas entregadas</label>
        <input type="number" name="latas_entregadas" min="1" required>
      </div>

      <div>
        <label>Fecha de entrega</label>
        <input type="date" name="fecha_entrega" required>
      </div>

      <div>
        <label>Próxima entrega</label>
        <input type="date" name="proxima_carga" required>
      </div>

      <div id="campoInicio" class="hidden">
        <label>Fecha inicio</label>
        <input type="date" name="fecha_inicio" required>
      </div>

      <div id="campoVencimiento" class="hidden">
        <label>Fecha vencimiento</label>
        <input type="date" name="fecha_vencimiento" required>
      </div>

      <!-- Observaciones -->
      <div class="form-group full-width">
        <label>Observaciones</label>
        <textarea id="observaciones" rows="3"></textarea>
      </div>

                <!-- Adjuntos -->
    <div class="form-row">
      <label>Adjuntar Documentos</label>
      <div id="adjuntosContainer" class="adjuntos-medicamentos"></div>
      <button type="button" id="btnAgregarAdjunto">➕ Agregar adjunto</button>
    </div>

    </div>

      <!-- ACCIONES -->
      <div class="form-actions">
        <button type="submit" class="btn-guardar">💾 Guardar</button>
        <button type="button" id="btnCancelarMedicamento" class="btn-cancelar">Cancelar</button>
      </div>

    </div>
  </form>

  <!-- LISTA -->
  <div id="listaMedicamentos"></div>

  <div id="paginacionMedicamentos" class="paginacion"></div>

</section>
