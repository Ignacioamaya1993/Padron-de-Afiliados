<style>
/* Mover todo a la izquierda */
main, section {
  max-width: none;
  margin: 0;
}

/* Lista de cards alineadas a la izquierda */
#listaOxigenoterapia {
  justify-content: start;
}
</style>

<section class="oxigenoterapia">

  <!-- BOTÓN NUEVA -->
  <button id="btnNuevaOxigenoterapia" class="btn-nuevo-oxigenoterapia">
    + Nueva Oxigenoterapia
  </button>

  <!-- FORMULARIO DE ALTA -->
  <form id="formOxigenoterapiaForm" class="form-card_oxigenoterapia hidden">

    <div class="form-grid">

      <div class="campo">
        <label for="tipoEquipoOxigenoterapia">Tipo equipo</label>
        <select id="tipoEquipoOxigenoterapia" name="tipoequipo_id" required>
          <option value="">Seleccione</option>
        </select>
      </div>

      <div class="campo">
        <label for="fechaInicioTratamiento">Fecha inicio tratamiento</label>
        <input 
          type="date" 
          id="fechaInicioTratamiento" 
          name="fecha_inicio_tratamiento" 
          required
        >
      </div>

      <div class="campo">
        <label for="fechaFinTratamiento">Fecha fin tratamiento</label>
        <input 
          type="date" 
          id="fechaFinTratamiento" 
          name="fecha_fin_tratamiento"
        >
      </div>

      <!-- REINTEGRO -->
      <div class="campo-reintegro">
        <div>
          <label>Reintegro</label>
          <input type="number" step="0.01" name="reintegro" placeholder="Opcional">
        </div>
        <div>
          <label>Fecha reintegro</label>
          <input type="date" name="fecha_reintegro">
        </div>
      </div>

    </div>

    <div class="campo full">
      <label for="observacionOxigenoterapia">Observación</label>
      <textarea 
        id="observacionOxigenoterapia" 
        name="observacion"
        rows="3"
      ></textarea>
    </div>

    <!-- ADJUNTOS -->
    <div class="bloque-adjuntos">
      <label>Adjuntar Documentos</label>
      <div id="adjuntosOxigenoterapiaContainer" class="adjuntos-nuevos_oxigenoterapia"></div>
      <button 
        type="button" 
        id="btnAgregarAdjuntoOxigenoterapia"
      >
        ➕ Agregar adjunto
      </button>
    </div>

    <!-- ACCIONES -->
    <div class="acciones-form">
      <button type="submit" class="btn-guardar">Guardar</button>
      <button 
        type="button" 
        id="btnCancelarOxigenoterapia"
        class="btn-cancelar"
      >
        Cancelar
      </button>
    </div>

  </form>

  <!-- LISTADO (CARDS) -->
  <div id="listaOxigenoterapia" class="lista-cards"></div>

  <!-- PAGINACIÓN -->
  <div id="paginacionOxigenoterapia" class="paginacion"></div>

</section>
