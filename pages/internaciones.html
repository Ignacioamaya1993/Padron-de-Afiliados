  <style>
/* Mover todo a la izquierda */
main, section {
  max-width: none;      /* quita el límite de ancho */
  margin: 0;            /* elimina el centrado automático */
}

#lista {
  justify-content: start; /* pega las cards al borde izquierdo */
}
</style>

<!-- INTERNACIONES -->
<section id="internacionesSection">

  <!-- Botón para nuevo registro -->
  <button id="btnNuevaInternacion" class="btn-nuevo-internacion">+ Nueva Internación</button>

  <!-- Formulario oculto -->
  <form id="formInternacion" class="form-card_internacion oculto">
    <div class="form-row">
      <label for="tipoInternacion">Tipo de internación</label>
      <select id="tipoInternacion" required></select>
    </div>

    <div class="form-row">
      <label for="fechaCarga">Fecha Carga</label>
      <input type="date" id="fechaCarga" required>
    </div>

        <div class="form-row">
      <label for="nroAutorizacion">N° de Autorización</label>
      <input type="text" id="nroAutorizacion">
    </div>

        <div>
      <label>Fecha Autorizacion</label>
      <input type="date" name="fecha_autorizacion">
    </div>

    <div class="form-row">
      <label for="nroCarga">N° de Carga</label>
      <input type="text" id="nroCarga">
    </div>

    <div class="form-row">
      <label for="fechaOrden">Fecha Orden</label>
      <input type="date" id="fechaOrden">
    </div>

    <div class="form-row">
      <label for="fechaRecepcionOrden">Fecha Recepción Orden</label>
      <input type="date" id="fechaRecepcionOrden">
    </div>

    <div class="form-row">
      <label for="fechaTurno">Fecha Turno</label>
      <input type="date" id="fechaTurno">
    </div>

    <div class="form-row">
      <label for="fechaCirugia">Fecha Cirugía</label>
      <input type="date" id="fechaCirugia">
    </div>

    <div class="form-row">
      <label for="fechaAlta">Fecha Alta</label>
      <input type="date" id="fechaAlta">
    </div>

    <div>
      <label>Fecha Ingreso</label>
      <input type="date" id="fechaIngreso">
    </div>

    <div class="form-row">
      <label for="lugarInternacion">Lugar</label>
      <select id="lugarInternacion" required></select>
    </div>

    <div class="form-row oculto" id="rowReintegro">
    <label for="reintegroInternacion">Reintegro</label>
    <input type="number" step="0.01" id="reintegroInternacion">
    </div>

      <!-- REINTEGRO (solo para edición) -->
      <div>
      <label>Reintegro</label>
      <input type="number" step="0.01" name="reintegro" placeholder="Opcional">
    </div>

    <div>
      <label>Fecha reintegro</label>
      <input type="date" name="fecha_reintegro">
    </div>

    <div class="form-row full-width">
      <label for="observacionesInternacion">Observaciones</label>
      <textarea id="observacionesInternacion" rows="3"></textarea>
    </div>

    <!-- Adjuntos -->
    <div class="form-row">
      <label>Adjuntar Documentos</label>
      <div id="adjuntosFormListaInternacion"class="adjuntos-nuevos_internacion"></div>
      <button type="button" id="btnAgregarAdjuntoFormInternacion">➕ Agregar adjunto</button>
    </div>

    <div class="form-actions">
      <button type="submit" class="btn-guardar">💾 Guardar</button>
      <button type="button" id="btnCancelarInternacion">Cancelar</button>
    </div>
  </form>

  <!-- Contenedor de cards -->
  <div id="contenedorInternaciones"></div>

  <!-- Paginación -->
  <div id="paginacionInternaciones" class="paginacion"></div>
</section>
