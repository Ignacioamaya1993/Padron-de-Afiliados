<style>
/* Mover todo a la izquierda */
main, section {
  max-width: none;
  margin: 0;
}

#listaMaterialesOrtopedicos {
  justify-content: start;
}
</style>

<section class="materiales-ortopedicos">

  <button id="btnNuevoMaterialOrtopedico" class="btn-nuevo-materiales">
    + Nuevo Material Ortopédico
  </button>

  <form id="formMaterialOrtopedico"
        class="form-card_materiales hidden">

    <input type="hidden" name="id" id="materialOrtopedicoId">

    <div class="form-grid">

      <div class="campo">
        <label>Fecha carga</label>
        <input type="date" name="fecha_carga" required>
      </div>

      <div class="campo">
        <label>Tipo</label>
        <select name="tipo_material_id"
                id="tipoMaterialOrtopedico"
                required>
          <option value="">Seleccionar...</option>
        </select>
      </div>

      <div class="campo full">
        <label>Observación</label>
        <textarea name="observacion"></textarea>
      </div>

      <div class="campo full">
        <label>Adjuntar documentos</label>

        <div id="adjuntosMaterialesContainer"
             class="adjuntos-nuevos_materiales">
        </div>

        <button type="button"
                id="btnAgregarAdjuntoMaterial"
                class="adjuntos-nuevos_materiales">
          ➕ Agregar adjunto
        </button>
      </div>

      <!-- REINTEGRO SOLO EN EDICIÓN -->
      <div id="grupoReintegroMaterial"
           class="campo full hidden">

        <div class="form-grid">

          <div class="campo">
            <label>Reintegro</label>
            <input type="number"
                   name="reintegro"
                   step="0.01">
          </div>

          <div class="campo">
            <label>Fecha reintegro</label>
            <input type="date"
                   name="fecha_reintegro">
          </div>

        </div>

      </div>

    </div>

    <div class="acciones-form">
      <button type="submit" class="btn-guardar">
        Guardar
      </button>

      <button type="button"
              id="btnCancelarMaterialOrtopedico"
              class="btn-cancelar">
        Cancelar
      </button>
    </div>

  </form>

  <!-- LISTA -->
  <div id="listaMaterialesOrtopedicos"
       class="lista-cards"></div>

  <!-- PAGINACION -->
  <div id="paginacionMaterialesOrtopedicos"
       class="paginacion"></div>

</section>
