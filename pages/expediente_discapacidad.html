<style>
/* Mover todo a la izquierda */
main, section {
  max-width: none;
  margin: 0;
}

/* Lista de cards alineadas a la izquierda */
#listaExpedienteDiscapacidad {
  justify-content: start;
}
</style>

<!-- ========================= -->
<!-- EXPEDIENTE DISCAPACIDAD  -->
<!-- ========================= -->

<section>

  <button id="btnNuevoExpedienteDiscapacidad" class="btn-nuevo-expediente">
    + Nuevo expediente
  </button>

  <!-- =========================
       FORMULARIO ALTA
  ========================= -->

  <div id="formExpedienteDiscapacidad" class="hidden">

    <form id="formExpedienteDiscapacidadForm" class="form-card_expediente">

      <div class="form-grid">

        <div class="campo">
          <label>Tipo expediente</label>
          <select name="tipo_expediente_id" id="tipoExpedienteDiscapacidad" required>
            <option value="">Seleccione</option>
          </select>
        </div>

        <div class="campo">
          <label>Fecha inicio</label>
          <input type="date" name="fecha_inicio" required>
        </div>

        <div class="campo">
          <label>Fecha finalización</label>
          <input type="date" name="fecha_finalizacion">
        </div>

        <!-- REINTEGRO -->
      <div class="campo-reintegro">
        <div>
          <label>Reintegro</label>
          <input 
            type="number" 
            step="0.01" 
            name="reintegro" 
            placeholder="Opcional"
          >
        </div>

        <div>
          <label>Fecha reintegro</label>
          <input 
            type="date" 
            name="fecha_reintegro"
          >
        </div>
      </div>
        
        <div class="campo full">
          <label>Observación</label>
          <textarea name="observacion"></textarea>
        </div>

        <!-- =========================
             ADJUNTOS
        ========================= -->

          <!-- ADJUNTOS -->
      <div class="campo full">
        <label>Adjuntar Documentos</label>
        <div id="adjuntosExpedienteDiscapacidadContainer" class="adjuntos-nuevos_expediente"></div>
        <button type="button" id="btnAgregarAdjuntoExpedienteDiscapacidad">
          ➕ Agregar adjunto
        </button>
      </div>
      </div>

      <!-- =========================
           BOTONES FORM
      ========================= -->

      <div class="acciones-form">
        <button type="submit" class="btn-guardar">💾 Guardar</button>
        <button type="button"
                id="btnCancelarExpedienteDiscapacidad"
                class="btn-cancelar">
          Cancelar
        </button>
      </div>

    </form>

  </div>

  <!-- =========================
       LISTADO
  ========================= -->

  <div id="listaExpedienteDiscapacidad" class="lista-cards"></div>

  <!-- =========================
       PAGINACIÓN
  ========================= -->

  <div id="paginacionExpedienteDiscapacidad" class="paginacion"></div>

</section>
